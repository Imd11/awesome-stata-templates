name: Documentation improvement
description: Suggest a README, index, or template explanation improvement.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: location
    attributes:
      label: Documentation location
      description: Which page or section should be improved?
      placeholder: "README.md, docs/TEMPLATE_INDEX.md, or a template path"
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What should be clearer?
      description: Describe the missing, confusing, or outdated documentation.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
      description: If you have wording or structure in mind, include it here.
    validations:
      required: false
